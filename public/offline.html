<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Afra Tech Point</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f9fafb;
      color: #111;
      text-align: center;
      padding: 2rem;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
    p { color: #6b7280; font-size: 0.9rem; max-width: 300px; line-height: 1.6; }
    button {
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: #111;
      color: white;
      border: none;
      border-radius: 1rem;
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
    }
    button:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're Offline</h1>
  <p>No internet connection found. Check your connection and try again.</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
